[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "yakoon-host-console"
version = "0.1.0"
dependencies = [
    "yakoon-core-base", 
    "yakoon-core-platform", 
    "yakoon-core-compose",

    "yakoon-auth",
    "yakoon-shell",
    "yakoon-office",    
    ]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
