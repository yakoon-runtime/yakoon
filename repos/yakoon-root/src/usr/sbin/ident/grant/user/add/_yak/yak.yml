version: 1.0.0

title: Grant Permission to User

resolvable: true
navigable: false

expose: false

executor: runtime

entry:
  run: app.py

invocation:
  params:
    - key: name
      positional: true
      required: true
    - key: permission
      positional: true
      required: true
    - key: bits
    - key: deny

document:
  default: resources/default.ydf

man:
  default: resources/man.ydf
