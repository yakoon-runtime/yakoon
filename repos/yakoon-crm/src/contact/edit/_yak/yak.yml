version: 1.0.0

title: Edit Contact

resolvable: true
navigable: false

expose: false

executor: runtime

entry:
  run: app.py

invocation:
  params:
    - key: name
      required: true
      positional: true
    - key: company
    - key: email
    - key: phone
    - key: street
    - key: zip
    - key: city
    - key: country
    - key: notes

man:
  default: resources/man.yak
