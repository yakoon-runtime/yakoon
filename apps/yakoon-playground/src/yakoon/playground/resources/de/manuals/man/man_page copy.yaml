kind: view

view:

  role: info
  title: General Commands Manual
  blocks:
    - type: text
      text: |
        Willkommen bei Yakoon.

        Diese Demo-Seite zeigt drei Dinge:
        1) Streaming-Ausgabe (Text wächst in Chunks),
        2) Container-Blöcke (Listen können Kinder aufnehmen),
        3) klassische Einrückung bei verschachtelten Listen.

        Tipp: Wenn du gerade testest, ändere die Fensterbreite – dann siehst du sofort,
        wie sich Wrapping und Layout verhalten.

    - type: rule
      style: subtle

    - type: list
      items:
        - head: "Kategorie: Navigation"
          blocks:
            - type: list
              items:
                - head: "cd – Verzeichnis wechseln (schnell, sicher, ohne Magie)"
                  blocks:
                    - type: list
                      items:
                        - "Beispiel: cd /home/stefan/dev/projects/yakoon"

        - head: "Kategorie: Diagnose"
          blocks:
            - type: list
              items:
                - head: "doctor – Systemcheck für Renderer & Streaming"
                  blocks:
                    - type: list
                      items:
                        - "Prüft IDs, Patch-Reihenfolge, Layout-Reflow und Widget-Registry."

    - type: list
      items:
        - "Hinweis: Große Ausgaben werden bevorzugt gestreamt, damit die UI responsiv bleibt."
        - "Hinweis: Listen-Items können eigene Blöcke enthalten (z.B. KV, weitere Listen, Regeln)."
        - "Hinweis: IDs sind Pflicht, sobald du patchbasiert (`append_text`, `append_child`) arbeitest."
        - "Hinweis: Wenn ein Eintrag plötzlich „springt“, ist es meist ein Wrap-Reflow, kein Stream-Bug."

    - type: rule
      style: subtle

    - type: text
      text: |
        Abschnitt: Verhalten bei Streaming

        - Textblöcke werden als Patch-Text gestreamt.
        - Listen werden als Container gestartet (leer), Items kommen per append_child.
        - Der Item-Head wird über eine Alias-ID "<item_id>.head" gestreamt.
        - Verschachtelte Listen erhöhen automatisch die Einrückung pro Ebene.

    - type: spacer
      size: 1

    - type: text
      text: |
        Abschnitt: Was du hier testen kannst

        1) Werden die Items wirklich nacheinander angehängt?
        2) Bleibt die Einrückung in jeder Ebene korrekt?
        3) Bleibt die Scroll-Position stabil, wenn ein Head umbricht?
        4) Sind Abstände konsistent (kein „leerer Body“)?

    - type: spacer
      size: 1

    - type: text
      id: intro
      text: "Das ist meine Aufzählung:"

    - type: list
      id: my_list
      items:
        - "Erster Punkt – kurze Zeile (Baseline)."
        - "Zweiter Punkt – etwas länger, damit Wrapping sichtbar wird, wenn das Fenster schmal ist."
        - "Dritter Punkt – mit einem Zusatz, der beim Streamen die Zeilenlänge überschreiten kann."
        - "Vierter Punkt – Demonstriert, dass viele Items stabil laufen (Registry + Layout)."
        - "Fünfter Punkt – Wenn das hier flackert, ist es wahrscheinlich der Scroll-Anker, nicht der Stream."
        - "Sechster Punkt – Nested-Tests gehören in die obere, verschachtelte Liste."
        - "Siebter Punkt – Ende der Demo-Liste."