kind: projection

projection:
  role: info
  title: "Commands"
  blocks:

    - type: fields
      fields:
        - name: result
          title: "Speichern (Ja/Nein)"
          policy: system:bool
          options:
            - { value: "yes", label: "Ja" }
            - { value: "no", label: "Nein" }
          error: "Bitte mit 'Ja' oder 'Nein' antworten."
