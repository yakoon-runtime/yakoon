<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>SAM Client</title>
    <link rel="stylesheet" href="./assets/base.css" />
    <link rel="stylesheet" href="./assets/block.css" />
    <link rel="stylesheet" href="./assets/inline.css" />
</head>

<body>

    <div id="app">
        <div id="sidebar"></div>

        <div id="main">

            <div id="topbar">
                <button id="toggle-sidebar">☰</button>
            </div>

            <div id="stream"></div>

            <div id="commandbar" class="input-card">
                <input id="commandbar-input" placeholder="Type a command..." />
                <div class="status-line">
                    <span class="brand">Yakoon</span>
                    <span class="sep"> · </span>
                    <span class="prefix">local:</span>
                    <span class="path">/$</span>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="./js/app.js"></script>

</body>



</html>
