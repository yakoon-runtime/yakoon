workflow: kunden_anlage
version: 1

start: first_name

steps:
  - id: first_name
    prompt:
      kind: text
      title: "Vorname"
      var: customer.first_name
      policy: system:string
    next: last_name

  - id: last_name
    prompt:
      kind: text
      title: "Nachname"
      var: customer.last_name
      policy: system:string
    next: ask_mail

  - id: ask_mail
    prompt:
      kind: select
      title: "E-Mail angeben?"
      var: customer.mail_opt_in  # default: no
      policy: system:bool
      default: y
      options:
        - { label: "Ja", value: y }
        - { label: "Nein", value: n }
    branch: { y: mail, n: done }

  - id: mail
    prompt:
      kind: text
      title: "E-Mail Adresse"
      policy: system:string
      var: customer.mail
    next: step_validate

  - id: step_validate
    run: wf:crm.customer.validate
    next: route
    #on_error: technical_failure

  - id: route
    switch:
      expr: "{{validate.state}}"
      cases:
        savde: store_customer
      default: store_customer

  - id: store_customer
    run: >
      wf:crm.customer.store 
      --first {{customer.first_name}} 
      --last {{customer.last_name}} 
      --mail_opt_in {{customer.mail_opt_in}} 
      --mail {{customer.mail}}
    next: done

  - id: done
    end: ok
