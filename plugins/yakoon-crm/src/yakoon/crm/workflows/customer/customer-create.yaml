workflow: kunden_anlage
version: 1

start: person

steps:
- id: person
  input:
    title: "Person"
    fields:
      - { name: customer.first_name, policy: system:string, title: "Vorname" }
      - { name: customer.last_name,  policy: system:string, title: "Nachname" }
      - { name: customer.pw,  policy: system:masked, title: "Password" }
  next: ask_mail

- id: ask_mail
  input:
    title: "E-Mail angeben?"
    fields:
      - name: customer.mail_opt_in
        policy: system:bool
        title: "E-Mail angeben?"
        default: true
        options:
          - { label: "Ja", value: true }
          - { label: "Nein", value: false }
    branches:
      on: customer.mail_opt_in
      cases:
        true: ask_mail_address
        false: store_customer

- id: ask_mail_address
  input:
    title: "E-Mail"
    fields:
      - name: customer.mail
        policy: system:string   # später: system:email
        title: "E-Mail-Adresse"
        required: true
  next: store_customer_with_mail

- id: store_customer
  run: wf:crm.customer.store 
  args:
    - "--first_name"
    - "{{customer.first_name}}"
    - "--last_name"
    - "{{customer.last_name}}"
  next: done

- id: store_customer_with_mail
  run: wf:crm.customer.store
  args:
    - "--first_name"
    - "{{customer.first_name}}"
    - "--last_name"
    - "{{customer.last_name}}"
    - "--mail"
    - "{{customer.mail}}"
  next: done

- id: step_validate
  run: wf:crm.customer.validate
  next: route

- id: route
  switch:
    expr: "{{validate.state}}"
    cases:
      save: done
    default: done

- id: done
  end: ok
