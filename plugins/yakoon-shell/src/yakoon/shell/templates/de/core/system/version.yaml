kind: command_view

views:

  show:
    title:
    role: info
    blocks:
      - type: kv
        items:
        - ["Platform Version", "{{ section.data.version  }}"]
        - ["Python", "{{ section.data.python }}"]
        - ["Hostname", "{{ section.data.hostname }}"]
        - ["Uptime", "{{ section.data.uptime }}"]
        - ["Time (UTC)", "{{ section.data.time }}"]
    meta:
      code: "shell.version.show"

inputs: {}