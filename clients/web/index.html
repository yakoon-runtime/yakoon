<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>SAM Client</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            height: 100vh;
            margin: 0;
        }

        .panel {
            flex: 1;
            border-right: 1px solid #ccc;
            padding: 10px;
            overflow: auto;
        }
    </style>

<body>

    <div id="canvas"></div>

    <div id="input-bar"

        <button onclick="sendCommand()">Send</button>
    </div>

    <script src="windows.js"></script>
    <script src="app.js"></script>

</html>
