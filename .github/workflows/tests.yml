name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e runtime/y5ncore-base
          pip install -e transports/y5ntrans-ws
          pip install -e stores/y5nstore-event
          pip install -e stores/y5nstore-sequence
          pip install -e runtime/y5ncore-runtime
          pip install -e runtime/y5ncore-llm
          pip install -e spaces/y5nspace-shell
          pip install -e spaces/y5nspace-runtime
          pip install -e spaces/y5nspace-ident
          pip install -e spaces/y5nspace-os
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest
