name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -e runtime/api
          pip install -e runtime/engine
          pip install -e runtime/transport
          pip install -e runtime/store
          pip install -e repos/y5napp-system
          pip install -e repos/y5napp-ident
          pip install -e sdk/python
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest runtime/engine/tests \
                runtime/store/event/tests \
                runtime/store/sequence/tests \
                -x --tb=short
