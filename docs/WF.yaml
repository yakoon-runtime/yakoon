start: first_name

steps:
  - id: first_name
    prompt: { type: text, title: "Vorname", var: customer.first_name }
    next: last_name

  - id: last_name
    prompt: { type: text, title: "Nachname", var: customer.last_name }
    next: ask_mail

  - id: ask_mail
    prompt:
      type: select
      title: "E-Mail angeben?"
      var: customer.mail_opt_in
      options:
        - { label: "Ja", value: yes }
        - { label: "Nein", value: no }
    branch: { yes: mail, no: street }

  - id: mail
    prompt: { type: text, title: "E-Mail", var: customer.mail }
    next: street

  - id: street
    prompt: { type: text, title: "Straße", var: customer.street }
    next: zip

  - id: zip
    prompt: { type: text, title: "PLZ", var: customer.zip }
    next: zip_validate

  - id: zip_validate
    validate:
      rule: regex
      var: customer.zip
      pattern: '^\d{5}$'
      error: "Bitte 5-stellige PLZ eingeben."
    branch: { ok: city, fail: zip }

  - id: city
    prompt: { type: text, title: "Ort", var: customer.city }
    next: phone

  - id: phone
    prompt: { type: text, title: "Telefon", var: customer.phone }
    next: confirm

  - id: confirm
    prompt:
      type: review
      title: "Weiter oder Abbruch?"
      require_ack: true
      actions:
        - { label: "Weiter", value: continue }
        - { label: "Abbruch", value: cancel }
    branch: { continue: execute, cancel: end_cancel }

  - id: execute
    run: "crm.create_customer --first {{customer.first_name}} --last {{customer.last_name}} --mail {{customer.mail}} --street {{customer.street}} --zip {{customer.zip}} --city {{customer.city}} --phone {{customer.phone}}"
    next: end_ok

  - id: end_ok
    end: ok

  - id: end_cancel
    end: cancel

---

workflow: kunden_anlage
version: 1
roles: [sales, support]

steps:
  - id: first_name
    prompt:
      type: text
      title: "Vorname"
      var: customer.first_name
    next: last_name

  - id: last_name
    prompt:
      type: text
      title: "Nachname"
      var: customer.last_name
    next: ask_mail

  - id: ask_mail
    prompt:
      type: select
      title: "E-Mail angeben?"
      var: customer.mail_opt_in
      options:
        - {label: "Ja", value: yes}
        - {label: "Nein", value: no}
    branch:
      yes: mail
      no: street

  - id: mail
    prompt:
      type: text
      title: "E-Mail"
      var: customer.mail
    next: street

  - id: street
    prompt:
      type: text
      title: "Straße"
      var: customer.street
    next: zip

  - id: zip
    prompt:
      type: text
      title: "PLZ"
      var: customer.zip
    next: zip_validate

  - id: zip_validate
    validate:
      rule: regex
      var: customer.zip
      pattern: '^\d{5}$'
      error: "Bitte 5-stellige PLZ eingeben."
    branch:
      ok: city
      fail: zip

  - id: city
    prompt:
      type: text
      title: "Ort"
      var: customer.city
    next: phone

  - id: phone
    prompt:
      type: text
      title: "Telefon"
      var: customer.phone
    next: confirm

  - id: confirm
    prompt:
      type: review
      title: "Weiter oder Abbruch?"
      require_ack: true
      actions:
        - {label: "Weiter", value: continue}
        - {label: "Abbruch", value: cancel}
    branch:
      continue: execute
      cancel: end_cancel

  - id: execute
    run: "crm.create_customer {{customer}}"
    audit: true
    next: end_ok

  - id: end_ok
    end: ok

  - id: end_cancel
    end: cancel


