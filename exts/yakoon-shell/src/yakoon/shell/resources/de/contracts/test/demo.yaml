
kind: projection

projection:
  role: info
  title: "Commands"
  blocks:

  # Der streamer zeigt den text an..
  - type: text
    text: "Geben Sie hier ihre Daten ein....."

  # Gleich danach wir eine Liste vom Host gerendert.
  - type: list
    items:
      - "man              - Zeigt Manual für Befehle"
      - "use <prg>        - Startet ein Programm"
      - "version          - Zeigt Systeminformationen"

  # Jetzt wird der Prompt geöffnet (funktioniert ja schon alles)
  - type: fields
    input_mode: prompt # form -> Oder es werden InputFelder vom Host gezeichnet. (kein Warten)
    fields:
      - { var: var_a, policy: customer.age, title: "Zahl (1 von 2)", required: true }
      - { var: var_b, policy: system:int, title: "Zahl (2 von 2)" } 

  # Gleich danach streamed der streamer wieder Text....
  - type: text
    text: "Hier erfolgt dann eine weiter eingabe..."


# Hinweis:
# Oberflächen werden dann vollständig über den Contract definiert und aufgebaut...
# Später folgen dann möglicheweise noch Actions (Buttons) usw...
