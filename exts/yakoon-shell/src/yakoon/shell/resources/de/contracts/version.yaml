kind: command_view

views:

  show:
    title:
    role: info
    blocks:
      - type: kv
        items:
        - ["Platform Version", "{{ data.version  }}"]
        - ["Python", "{{ data.python }}"]
        - ["Hostname", "{{ data.hostname }}"]
        - ["Uptime", "{{ data.uptime }}"]
        - ["Time (UTC)", "{{ data.time }}"]
    meta:
      code: "shell.version.show"

inputs: {}