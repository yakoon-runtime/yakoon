kind: projection

projection:
  role: info
  title: "Commands"

  blocks:
    {% if state.mode == "shell" %}

    - type: text   
      text: "Commands"

    - type: list
      items:
        {% for c in state.shell_commands %}
        - head: "{{ c.key }}" 
        {% endfor %}

    - type: rule
      style: subtle

    - type: text
      text: "Available programs"

    - type: list
      items:
        {% for p in state.controllers %}
          - head: "{{ p.id }}"
        {% endfor %}

    {% elif state.mode == "program" %}

    - type: text
      text: "Commands"

    - type: list
      items:
        {% for c in state.commands %}
        - head: "{{ c.key }}"
        {% endfor %}

    {% endif %}