kind: state
state:
  role: info
  title: "Commands"
  blocks:
    {% if mode == "shell" %}

    - type: text
      text: "Commands"

    - type: list
      items:
        {% for c in shell_commands %}
        - head: "{{ c.key }}" 
        {% endfor %}

    - type: rule
      style: subtle

    - type: text
      text: "Available programs"

    - type: list
      items:
        {% for p in controllers %}
          - head: "{{ p.id }}"
        {% endfor %}

    {% elif mode == "program" %}

    - type: text
      text: "Commands"

    - type: list
      items:
        {% for c in commands %}
        - head: "{{ c.key }}"
        {% endfor %}

    {% endif %}