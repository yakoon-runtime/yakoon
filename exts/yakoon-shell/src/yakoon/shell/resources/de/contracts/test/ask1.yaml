kind: projection

projection:
  role: info
  title: "Commands"
  blocks:
    - type: text
      text: "Suche nach Projekten:"
    - type: fields
      fields:
        - { var: result, policy: system:string, title: "Projektname" } 
        - { var: xresult, policy: system:string, title: "Test" } 

    - type: actions
      actions:
        - label: Speichern
          command: project.save