kind: state

state:
  role: info
  title: "Commands"
  blocks:
    - type: kv
      items:
      - ["Platform Version", "{{ version  }}"]
      - ["Python", "{{ python }}"]
      - ["Hostname", "{{ hostname }}"]
      - ["Uptime", "{{ uptime }}"]
      - ["Time (UTC)", "{{ time }}"]
  meta:
    code: "shell.version.show"
