kind: state

state:
  role: info
  title: "Commands"
  blocks:
    - type: kv
      items:
      - ["Platform Version", "{{ data.version  }}"]
      - ["Python", "{{ data.python }}"]
      - ["Hostname", "{{ data.hostname }}"]
      - ["Uptime", "{{ data.uptime }}"]
      - ["Time (UTC)", "{{ data.time }}"]
  meta:
    code: "shell.version.show"
