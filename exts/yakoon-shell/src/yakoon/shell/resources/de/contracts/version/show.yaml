kind: projection

projection:
  role: info
  title: "Commands"


  blocks:
    - type: kv
      items:
      - ["Platform Version", "{{ state.version  }}"]
      - ["Python", "{{ state.python }}"]
      - ["Hostname", "{{ state.hostname }}"]
      - ["Uptime", "{{ state.uptime }}"]
      - ["Time (UTC)", "{{ state.time }}"]


